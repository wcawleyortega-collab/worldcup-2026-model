name: ci

# Run the unit tests on every push and pull request so the core forecasting
# math (Elo, the Poisson/Dixon-Coles goal model, the market and squad layers)
# stays correct as the model evolves.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q
